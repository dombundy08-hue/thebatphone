our workflow, not an off-the-shelf tool, so it gives you time back and drops straight to your bottom line. What's eating the most time for your team right now?",options:[{label:"That's actually a problem for us",tag:"positive",next:"discovery"},{label:"We already have something for that",tag:"neutral",next:"objectionHaveSolution"},{label:"Sounds expensive",tag:"neutral",next:"objectionPrice"},{label:"Not interested",tag:"negative",next:"objectionNotInterested"}]},discovery:{stage:"Discovery",text:"Got it \u2014 that's exactly what we fix. Most clients get real hours back within the first month, and it shows up in what they're not paying someone to do manually. Can I grab 20 minutes this week to show you what that'd look like for your business, no pressure?",options:[{label:"Yes, let's book it",tag:"positive",next:"closeWin"},{label:"Send details first",tag:"neutral",next:"sendInfo"},{label:"Not right now",tag:"neutral",next:"objectionTiming"}]},objectionPrice:{stage:"Objection \u2014 Price",text:"Makes sense, most people expect this to be a big lift. It usually pays for itself within the first couple months in time and labor cost saved alone. Want me to show you real numbers for a business your size before you decide either way?",options:[{label:"Okay, show me",tag:"positive",next:"discovery"},{label:"Still not interested",tag:"negative",next:"objectionNotInterested"}]},objectionHaveSolution:{stage:"Objection \u2014 Already Have Something",text:"Good to hear you're already thinking about it. Most of what we build works alongside existing tools instead of replacing them, since it's custom to your workflow. Mind if I ask what's still falling through the cracks?",options:[{label:"Shares what's missing",tag:"positive",next:"discovery"},{label:"No, we're covered",tag:"negative",next:"objectionNotInterested"}]},objectionSkeptical:{stage:"Objection \u2014 AI Skepticism",text:"Totally understand, a lot of 'AI' out there is overhyped. What we build is narrow and boring on purpose, it just does one repetitive task reliably, no chatbot gimmicks. Want a five-minute example for your business?",options:[{label:"Okay, I'll listen",tag:"positive",next:"discovery"},{label:"Still no",tag:"negative",next:"objectionNotInterested"}]},objectionNotInterested:{stage:"Objection \u2014 Not Interested",text:"No worries at all, appreciate you being upfront. Mind if I send a short email so it's on your radar if anything changes down the line?",options:[{label:"Sure, that's fine",tag:"neutral",next:"sendInfo"},{label:"No, please don't",tag:"negative",next:"closeLose"}]},objectionTiming:{stage:"Objection \u2014 Timing",text:"Completely understand, timing matters. When would make more sense to reconnect, a few weeks or next quarter?",options:[{label:"A few weeks",tag:"neutral",next:"callback"},{label:"Next quarter",tag:"neutral",next:"callback"},{label:"Don't call again",tag:"negative",next:"closeLose"}]},sendInfo:{stage:"Wrap Up",text:"Get their email and send the one-pager today. Then log this call below.",isEnd:!0,outcome:"Info Sent"},callback:{stage:"Wrap Up",text:"Logged as a callback \u2014 pick a follow-up date below so it lands on your radar.",isEnd:!0,outcome:"Callback Scheduled"},closeWin:{stage:"Wrap Up",text:"Booked! Get the meeting on the calendar before you hang up. Then log this call below.",isEnd:!0,outcome:"Demo Booked"},closeLose:{stage:"Wrap Up",text:"Logged as not interested. Thank them for their time and end the call politely.",isEnd:!0,outcome:"Not Interested"}},Ud="Hi [Name], this is [Your Name] with [Your Company]. Sorry I missed you \u2014 quick reason for the call: we build AI voice agents that answer your phone, talk to customers, and book appointments automatically, so you never miss a lead even after hours. I'd love to play you a two-minute example built for a business like yours. You can reach me at [Your Number], or I'll try you again in a couple of days. Thanks, and have a great one!",g1=["DING DING DING! {n} dials down. The phone fears you now.","{n} calls today. That's not luck, that's volume. Keep swinging.","BOOM \u2014 {n} calls! Champions dial when nobody's watching.","{n} on the board. Every no is a step closer to the yes."],y1=["{n} DEMOS THIS WEEK. To the Batcave \u2014 you've earned it.","{n} demos booked! That's pipeline, baby. That's the whole game.","HOLY BOOKINGS \u2014 {n} demos this week. Somebody's eating well this month.","{n} demos. The calendar is filling and the phone is smoking."],x1="Last 10 calls, zero bookings. Might be the script, might be the list, might be the hour. Worth a change-up?",L1="7+ of your last 10 went to voicemail or no-answer. This time window might be dead \u2014 different hours, or double down?",S1=`Team Onboarding & Role Agreement Outbound Appointment Setter

Welcome aboard. This packet lays out your role, how you're paid, what's expected of you, and the rules you follow while representing us. Read it in full before your first call \u2014 everything here matters.

1. Your Position
You make outbound calls to local businesses, qualify the ones with real interest, and book them onto my calendar for a sales conversation. I run the close. When a deal I close came from an appointment you booked, you're paid $300. You are not responsible for closing, pricing, or building anything. Your one job: quality conversations that turn into booked, qualified appointments.

2. Compensation
$300 cash per finalized sale that came from an appointment you booked. "Finalized" means the client has signed and paid \u2014 not "interested," not "thinking about it." Paid to you within 7 days of the client's payment clearing to me.
Paid $300 per closed client \u2014 flat. It's the same $300 whether that client buys one website or several.
Who gets credit: You're credited for any client I close that came from an appointment you booked \u2014 with no time limit. If you booked it and it eventually closes, it's yours, whether that's next week or next year.
The appointment must be logged in the system. If it isn't in the log, it didn't happen \u2014 the log is the record. Whoever books the qualified appointment first owns the credit.
What does not pay: No-shows (unless they reschedule and later close). Appointments that don't meet the "Qualified" bar in Section 3. Deals I sourced separately that you didn't book. A sale that falls through. Clients can only refund within about 7 days, so if it collapses in that window, that sale doesn't count and no $300 is owed.

3. What Makes an Appointment "Qualified"
This is the most important part of the whole packet \u2014 it's what stands between a call and a payout. An appointment counts only if all five are true:
Right business \u2014 a real local business that could actually use a better website (the kind you'll be pulling from Google Maps / Google Business listings).
Decision-maker \u2014 you spoke with the owner or the person who can actually say yes. Not the front desk. Not "I'll pass it along."
Genuine interest \u2014 they agreed to a real conversation about their website, not just "sure, send info."
Confirmed time \u2014 a specific date and time is booked, and they know it's a real sales conversation.
Logged \u2014 the appointment and notes are entered in the system before you move on.
Miss any one of these and it's a lead, not a qualified appointment. Keep working it \u2014 just don't book it as ready for me until it qualifies.

4. Your Daily Responsibilities
Call target: aim for 100 dials a day. There's no hard quota \u2014 what matters is that you're securing real contacts and booking appointments. The dials are just the engine that gets you there.
Appointment target: 5 qualified appointments per week to start.
Your schedule is yours. Work whenever you want, for as long as you want. The only hard rule is the calling window in Section 6 \u2014 no calls outside it, ever.
Log everything, same day. Every call gets a disposition and a note. A call that isn't logged is invisible \u2014 and can't be credited.

5. Using the Call System
Log every call \u2014 connected, no-answer, voicemail, not-interested, callback, booked. Use the disposition buttons honestly. The data shows both of us what's working.
Capture the notes: who you talked to, what they said, objections, next step. The log is the official record for your pay \u2014 keeping it clean protects you.

6. Rules for Every Call (non-negotiable)
We call businesses, which is lighter-regulated than calling consumers \u2014 but "lighter" is not "no rules." Every one of these is required:
Calling hours: only between 8:00 a.m. and 9:00 p.m. in the prospect's local time zone. No calls before 8 or after 9, their time \u2014 no exceptions.
Identify yourself honestly at the start of every call \u2014 your name and who you're calling on behalf of. No fake names, no pretending to be someone you're not.
Honor opt-outs immediately. "Don't call me again" / "take me off your list" = mark them Do-Not-Call in the system, and never call them again.
No auto-dialers or pre-recorded messages to cell phones. Dial manually.
Never misrepresent the product, the price, results, or who we are.
If you're ever unsure whether a call is allowed, ask me before making it.

7. Finding Your Leads
You build your own list. Pull prospects from Google Maps and Google Business listings \u2014 local businesses whose websites are dated, slow, or missing entirely are your best targets. Keep your leads organized in the system as you work them, so nothing falls through the cracks and your bookings stay tied to you.

8. Your Lane vs. My Lane
Your lane (booking): Get them interested enough to book a real conversation. Surface the problem (slow site, dated look, not bringing in calls) and the value of fixing it. Handle the basic objections enough to earn the appointment.
My lane (closing): Pricing, scope, agreements, and the actual yes. Do not promise a specific price, timeline, feature set, or guaranteed result.
If they push for a price: "That's exactly what [name] will walk you through \u2014 it depends on what your business needs, and that's a quick conversation."
Over-promising to book an appointment just costs you the payout when it falls apart. A script and objection responses come separately \u2014 this packet is the rules of the road.

9. Handing Off a Booked Appointment
Appointments are booked automatically through the system. You just log the appointment in \u2014 it routes straight to me, and I'll see it on my end. No separate heads-up needed.
Enter the details cleanly: business name, contact name, phone/email, and your notes on what they want and why they're interested.
If an appointment cancels or reschedules, update it in the system right away so we don't lose the thread.

10. Conduct & Representing Us
You are the first impression of this company. Be professional, warm, and honest on every call \u2014 even the rude ones. No arguing, no pressure tactics, no exaggeration. We win by being useful, not pushy.
Keep everything confidential. Don't share your leads or any business info outside this work.

11. Terms
