e-shelf tool, so it gives you time back and drops straight to your bottom line. What's eating the most time for your team right now?",options:[{label:"That's actually a problem for us",tag:"positive",next:"discovery"},{label:"We already have something for that",tag:"neutral",next:"objectionHaveSolution"},{label:"Sounds expensive",tag:"neutral",next:"objectionPrice"},{label:"Not interested",tag:"negative",next:"objectionNotInterested"}]},discovery:{stage:"Discovery",text:"Got it \u2014 that's exactly what we fix. Most clients get real hours back within the first month, and it shows up in what they're not paying someone to do manually. Can I grab 20 minutes this week to show you what that'd look like for your business, no pressure?",options:[{label:"Yes, let's book it",tag:"positive",next:"closeWin"},{label:"Send details first",tag:"neutral",next:"sendInfo"},{label:"Not right now",tag:"neutral",next:"objectionTiming"}]},objectionPrice:{stage:"Objection \u2014 Price",text:"Makes sense, most people expect this to be a big lift. It usually pays for itself within the first couple months in time and labor cost saved alone. Want me to show you real numbers for a business your size before you decide either way?",options:[{label:"Okay, show me",tag:"positive",next:"discovery"},{label:"Still not interested",tag:"negative",next:"objectionNotInterested"}]},objectionHaveSolution:{stage:"Objection \u2014 Already Have Something",text:"Good to hear you're already thinking about it. Most of what we build works alongside existing tools instead of replacing them, since it's custom to your workflow. Mind if I ask what's still falling through the cracks?",options:[{label:"Shares what's missing",tag:"positive",next:"discovery"},{label:"No, we're covered",tag:"negative",next:"objectionNotInterested"}]},objectionSkeptical:{stage:"Objection \u2014 AI Skepticism",text:"Totally understand, a lot of 'AI' out there is overhyped. What we build is narrow and boring on purpose, it just does one repetitive task reliably, no chatbot gimmicks. Want a five-minute example for your business?",options:[{label:"Okay, I'll listen",tag:"positive",next:"discovery"},{label:"Still no",tag:"negative",next:"objectionNotInterested"}]},objectionNotInterested:{stage:"Objection \u2014 Not Interested",text:"No worries at all, appreciate you being upfront. Mind if I send a short email so it's on your radar if anything changes down the line?",options:[{label:"Sure, that's fine",tag:"neutral",next:"sendInfo"},{label:"No, please don't",tag:"negative",next:"closeLose"}]},objectionTiming:{stage:"Objection \u2014 Timing",text:"Completely understand, timing matters. When would make more sense to reconnect, a few weeks or next quarter?",options:[{label:"A few weeks",tag:"neutral",next:"callback"},{label:"Next quarter",tag:"neutral",next:"callback"},{label:"Don't call again",tag:"negative",next:"closeLose"}]},sendInfo:{stage:"Wrap Up",text:"Get their email and send the one-pager today. Then log this call below.",isEnd:!0,outcome:"Info Sent"},callback:{stage:"Wrap Up",text:"Logged as a callback \u2014 pick a follow-up date below so it lands on your radar.",isEnd:!0,outcome:"Callback Scheduled"},closeWin:{stage:"Wrap Up",text:"Booked! Get the meeting on the calendar before you hang up. Then log this call below.",isEnd:!0,outcome:"Demo Booked"},closeLose:{stage:"Wrap Up",text:"Logged as not interested. Thank them for their time and end the call politely.",isEnd:!0,outcome:"Not Interested"}},Tv={start:{stage:"Opening",text:"Hi, is this [Owner's Name]?",options:[{label:"Yes, speaking",tag:"positive",next:"pickPitch"},{label:"Who's calling?",tag:"neutral",next:"pickPitch"}]},pickPitch:{stage:"Pick Your Pitch",text:"(You looked them up before dialing \u2014 which case is this? Tonality from here: neutral, curious, about THEM \u2014 not you.)",options:[{label:"PITCH 1 \u2014 they HAVE a website",tag:"neutral",next:"pitch1"},{label:"PITCH 2 \u2014 they have NO website",tag:"neutral",next:"pitch2"}]},pitch1:{stage:"Pitch 1 \u2014 Upgrade Their Site",text:"Hey, I just found you on Google and noticed you have really good reviews. Then I clicked on your website and noticed it could use some improvement \u2014 so I just went ahead and built you a brand new one. Do you have five minutes to see it?",options:[{label:"Sure, show me",tag:"positive",next:"closeWin"},{label:"Interested but hesitant\u2026",tag:"neutral",next:"cheatCode"},{label:"Can you just send me an email?",tag:"neutral",next:"objEmail"},{label:"We're not interested",tag:"negative",next:"objNotInterested"},{label:"We already have a website",tag:"neutral",next:"objHaveSite"},{label:"How much does it cost?",tag:"neutral",next:"objPrice"},{label:"We tried that before, didn't work",tag:"neutral",next:"objTried"},{label:"I'm not the decision maker",tag:"neutral",next:"objDM"}]},pitch2:{stage:"Pitch 2 \u2014 No Website Yet",text:"I just found you on Google and noticed you have really good reviews \u2014 and then I tried to click a link and saw you don't have a website. I thought it was a shame that you have such good reviews but nowhere to display them, so I just went ahead and built you a brand new website. Do you have five minutes to see it?",options:[{label:"Sure, show me",tag:"positive",next:"closeWin"},{label:"Interested but hesitant\u2026",tag:"neutral",next:"cheatCode"},{label:"Can you just send me an email?",tag:"neutral",next:"objEmail"},{label:"We're not interested",tag:"negative",next:"objNotInterested"},{label:"We don't have a budget right now",tag:"negative",next:"objBudget"},{label:"Just not a priority for us",tag:"neutral",next:"objNotPriority"},{label:"How much does it cost?",tag:"neutral",next:"objPrice"},{label:"I'm not the decision maker",tag:"neutral",next:"objDM"}]},cheatCode:{stage:"Cheat Code \u2014 Hesitation",text:"Hey, I feel a little hesitation here. Like I said, it's already built \u2014 if you have five minutes, I'll show you. Worst case scenario, you know exactly what your brand-new website would look like.",options:[{label:"Okay, show me",tag:"positive",next:"closeWin"},{label:"Send it in an email instead",tag:"neutral",next:"objEmail"},{label:"No thanks",tag:"negative",next:"softExit"}]},objEmail:{stage:'Objection \u2014 "Just Send an Email"',text:"Oh yeah, I can definitely send you an email, no problem. But without understanding what you're trying to do with your business, I wouldn't even know what to send you \u2014 I could throw out some random price or service, but it might not even make sense for what you actually need. So just so I'm not sending you something irrelevant \u2014 do you already have a website right now, or are you mainly getting customers through referrals or social media?",options:[{label:"They have a website",tag:"neutral",next:"probeSite"},{label:"Mostly referrals / social",tag:"neutral",next:"referralReframe"},{label:"Insists: just email me",tag:"negative",next:"sendInfo"}]},objNotInterested:{stage:"Objection \u2014 Not Interested",text:"Totally understand \u2014 just out of curiosity though, do you already have a website that's consistently bringing you new customers, or do you mainly rely on referrals and repeat business?",options:[{label:"They have a website",tag:"neutral",next:"probeSite"},{label:"Referrals mostly",tag:"neutral",next:"referralReframe"},{label:"Hard no",tag:"negative",next:"softExit"}]},probeSite:{stage:"Probe \u2014 Site Performance",text:"Gotcha \u2014 and do you feel like your website is performing well for you in terms of generating new customers\u2026 or do you feel like it could probably do better?",options:[{label:"Could probably do better",tag:"positive",next:"bizCard"},{label:"It's doing great",tag:"neutral",next:"plantSeed"}]},referralReframe:{stage:"Reframe \u2014 Referrals",text:"Okay \u2014 I hear that a lot, and honestly most businesses I talk to are in the same boat. The thing is, when you have a website that's actually built to generate leads, all you have to do is close them. So I'm curious \u2014 have you ever thought about getting a website that could bring you customers without you having to chase them?",options:[{label:"That'd be interesting",tag:"positive",next:"bizCard"},{label:"Not really",tag:"negative",next:"plantSeed"}]},bizCard:{stage:"Reframe \u2014 Digital Business Card",text:"Yeah \u2014 that's super common. Honestly, most websites are like digital business cards: they look nice but don't really do anything for the business. What we do differently is build websites that are actually designed to convert visitors into paying customers. Would you be open to me showing you how we could turn yours into a lead-generating machine?",options:[{label:"Yes, show me",tag:"positive",next:"closeWin"},{label:"Send me the details",tag:"neutral",next:"sendInfo"},{label:"No",tag:"negative",next:"softExit"}]},objHaveSite:{stage:"Objection \u2014 Already Have a Website",text:"Totally get it \u2014 a lot of the businesses I talk to already have a website too. But just out of curiosity, do you feel like it's actually bringing you a steady flow of new customers every month, or is it mainly just there for looks?",options:[{label:"Mainly for looks, honestly",tag:"neutral",next:"bizCard"},{label:"It brings customers",tag:"neutral",next:"plantSeed"}]},objPrice:{stage:'Objection \u2014 "How Much?"',text:"Yeah, that's a really good question! Honestly though, without understanding your goals and what you're looking for, I'd just be throwing out a random number \u2014 and it might not even be a good deal for you. So if it helps, I can ask you a few quick questions just to get a feel for what you need, and then put together a quote that's actually tailored to your business.",options:[{label:"Okay, ask away",tag:"positive",next:"closeWin"},{label:"Just give me a ballpark",tag:"neutral",next:"bizCard"},{label:"Not interested",tag:"negative",next:"softExit"}]},objTried:{stage:"Objection \u2014 Tried It Before",text:"Ahhh gotcha \u2014 yeah, I hear that a lot
